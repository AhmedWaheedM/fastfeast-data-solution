database:
  type: duckdb             
  name: fastfeast         
  file: fastfeast.duckdb  
  read_only: false         

paths:
  master_dir: /data/master/
  batch_dir: data/input/batch/
  stream_dir: /data/input/stream/
  output_dir: /data/output/
  log_file: /output/
  quarantine_file : /validation/
  report_file : /output/
  alert_file : /output/
  check_point_file : /utilities/

pipeline:
  batch_size: 1000
  retry_attempts: 3
  #max_threads: 4
  log_level: INFO
  mode : hybrid 
# every time we run pipeline for test we may change between batch or stream run,
# also can set this Test : to run pipeline at anytime


datetime_handling:
  extract_date_key: true
  extract_time_key: true
  date_key_format: "%Y-%m-%d"
  time_key_format: "%H%M%S"
  keep_original_timestamp: true

logging:
  rotate: daily
  backup_count: 7
  level: INFO

alerts:
  email: supervisor@gmail.com
  on_fail: true

stream:
  poll_interval_sec: 30      # event-based, check every 30 seconds
  file_pattern: ["*.csv", "*.json"] 

batch:
  schedule: "7:00" # time-based
  file_pattern: ["*.csv", "*.json"] 
  max_files_per_run: 10   
# this will be detected through experience with data, or we can calc the time for each batch
# and take the batch with the best time 

threshold:
  max_open: 1
  max_response: 15
  #orphan_rate: 