database:
  type: duckdb
  name: fastfeast
  file: fastfeast.duckdb
  read_only: false

paths:
  data_dir:       data/
  bronze_dir:     bronze/
  master_dir:     data/master/
  batch_dir:      data/batch/
  stream_dir:     ../data/stream/
  output_dir:     data/output/
  log_dir:        logs/
  quarantine_dir: data/quarantine/
  report_dir:     data/reports/
  alert_dir:      data/alerts/
  checkpoint_dir: data/checkpoints/
  metadata_file:  pipeline/config/files_metadata.yaml

pipeline:
  batch_size: 1000
  retry_attempts: 3
  log_level: INFO
  mode: hybrid
  max_workers: 4
  sleep_hours: 1
  max_attempts: 3

export:
  enabled: true
  format: parquet
  target_layer: gold

datetime_handling:
  extract_date_key: true
  extract_time_key: true
  date_key_format: "%Y%m%d"
  time_key_format: "%H%M%S"
  keep_original_timestamp: true

logging:
  rotate: daily
  backup_count: 7
  level: INFO
  max_bytes:   5242880
  fmt:         "%(asctime)s  %(levelname)-8s  [%(name)s]  %(message)s"
  datefmt:     "%Y-%m-%dT%H:%M:%S"

alerts:
  email:         ehabnasr406@gmail.com
  on_fail:       true
  smtp_host:     smtp.gmail.com
  smtp_port:     587
  smtp_user:     ehabnasr406@gmail.com
  slack_webhook: ""
  max_queue_size:       100
  send_timeout_sec:     15
  shutdown_timeout_sec: 30

stream:
  poll_interval_sec: 30
  file_pattern: ["*.csv", "*.json"]

batch:
  schedule: daily
  file_pattern: ["*.csv", "*.json"]
  max_files_per_run: 10

threshold:
  max_open: 1
  max_response: 15

log_parser:
  tail_per_file: 500
  filter_last_n: 200